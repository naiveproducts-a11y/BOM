<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naive Innova — Stock Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Prompt','Noto Sans Thai',sans-serif;background:#f0f2f5;color:#222;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
input[type=number]::-webkit-inner-spin-button{opacity:1}
.header{background:linear-gradient(135deg,#1B5E20 0%,#2E7D32 40%,#1A3A5C 100%);padding:20px 24px 14px;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.logo{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:24px}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:11px;opacity:.7;margin-top:2px}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.tab{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;white-space:nowrap;transition:.2s;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.tab.active{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.tab[data-c="g"].active{color:#2E7D32}.tab[data-c="b"].active{color:#1565C0}.tab[data-c="o"].active{color:#E65100}.tab[data-c="p"].active{color:#6A1B9A}
.content{padding:16px 16px 100px;max-width:1400px;margin:0 auto}
.panel{display:none;animation:slideUp .3s ease-out}.panel.active{display:block}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;padding:10px 14px;border-radius:10px;border:2px solid #e0e0e0;font-size:14px;outline:none;font-family:inherit;transition:.2s}
.search-box:focus{border-color:#2E7D32;box-shadow:0 0 0 3px rgba(46,125,50,.12)}
.btn{padding:10px 22px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:.15s;box-shadow:0 3px 10px rgba(0,0,0,.12)}
.btn:hover{transform:translateY(-1px)}.btn-green{background:linear-gradient(135deg,#2E7D32,#43A047);color:#fff}.btn-red{background:linear-gradient(135deg,#C62828,#E53935);color:#fff}.btn-blue{background:linear-gradient(135deg,#1565C0,#1E88E5);color:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 8px;font-weight:600;text-align:center;white-space:nowrap;font-size:11px}
td{padding:8px;border-bottom:1px solid #f0f0f0}
.tbl-scroll{overflow-x:auto;max-height:72vh;overflow-y:auto}
.ci{width:80px;padding:4px 6px;border:1.5px solid #e0e0e0;border-radius:6px;text-align:center;font-size:12px;font-family:inherit;transition:.2s}
.ci:focus{border-color:#2E7D32;outline:none;box-shadow:0 0 0 2px rgba(46,125,50,.15)}
.ci-w{width:100px}
.badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
.b-r{background:#FF1744;color:#fff}.b-y{background:#FF9100;color:#fff}.b-g{background:#00C853;color:#fff}
.ov{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);animation:fadeIn .2s}.ov.show{display:flex}
.modal{background:#fff;border-radius:16px;width:92%;max-width:540px;max-height:85vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popIn .2s ease-out}
.mh{padding:16px 22px;display:flex;justify-content:space-between;align-items:center}.mh h3{color:#fff;font-size:17px;font-weight:700}
.mx{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.mb{padding:20px 22px;overflow-y:auto;max-height:calc(85vh - 64px)}
.fg{margin-bottom:14px}.fl{font-size:12px;font-weight:600;color:#555;margin-bottom:4px;display:block}
.fi{width:100%;padding:10px 12px;border-radius:8px;border:2px solid #e0e0e0;font-size:14px;font-family:inherit;transition:.2s;outline:none}
.fi:focus{border-color:#2E7D32;box-shadow:0 0 0 3px rgba(46,125,50,.12)}
.fr{display:flex;gap:12px}.fr>div{flex:1}
.btn-sub{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;margin-top:6px}
.sel-wrap{position:relative}
.sel-btn{padding:10px 12px;border-radius:8px;border:2px solid #e0e0e0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:space-between;min-height:42px;transition:.2s;font-size:13px;font-family:inherit;width:100%;text-align:left}
.sel-btn.open{border-color:#2E7D32}
.sel-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:2000;background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.2);border:1px solid #e0e0e0;max-height:300px;overflow:hidden;display:none}
.sel-drop.show{display:block;animation:popIn .15s ease-out}
.sel-search{width:100%;border:none;border-bottom:1px solid #f0f0f0;padding:10px 14px;font-size:13px;outline:none;font-family:inherit;box-sizing:border-box}
.sel-list{max-height:240px;overflow-y:auto}
.sel-item{padding:9px 14px;cursor:pointer;font-size:13px;transition:.1s;border-left:3px solid transparent}
.sel-item:hover{background:#f0f0f0}.sel-item.on{background:#E8F5E9;border-left-color:#2E7D32;font-weight:600}
.calc-box{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);border-radius:14px;padding:16px 20px;margin-bottom:16px}
.calc-box h3{color:#1565C0;font-size:14px;font-weight:700;margin-bottom:10px}
.cp{display:flex;flex-wrap:wrap;gap:10px}
.cpi{background:#fff;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cpn{font-size:11px;font-weight:600;max-width:120px;line-height:1.2}
.cb{display:flex;align-items:center;gap:2px}
.cbtn{width:30px;height:30px;border-radius:6px;border:1.5px solid #e0e0e0;background:#f5f5f5;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:inherit}
.cbtn:hover{background:#e0e0e0}
.cinp{width:56px;padding:4px;border:2px solid #1565C0;border-radius:6px;text-align:center;font-size:14px;font-weight:700;font-family:inherit}
.empty{padding:48px 24px;text-align:center;color:#bbb}.empty .ic{font-size:48px;margin-bottom:12px}
.si{position:fixed;bottom:20px;right:20px;background:#2E7D32;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.2);opacity:0;transition:.3s;z-index:9999;pointer-events:none}.si.show{opacity:1}
@media print{body{background:#fff!important}}
.print-banner{display:none}

</style>
</head>
<body>
<div class="header"><div class="header-top"><div class="logo">🧪</div><div><h1>Naive Innova — Stock Manager</h1><p>ระบบจัดการสต๊อกวัตถุดิบ & BOM Calculator | ข้อมูลบันทึกอัตโนมัติ ไม่หายเมื่อปิด</p></div></div><div class="tabs" id="tabBar"></div></div>
<div class="content"><div class="panel active" id="p-stock"></div><div class="panel" id="p-tx"></div><div class="panel" id="p-bom"></div><div class="panel" id="p-calc"></div></div>
<div class="ov" id="ov-receive"><div class="modal"><div class="mh" style="background:linear-gradient(135deg,#2E7D32,#43A047)"><h3>➕ รับวัตถุดิบเข้าสต๊อก</h3><button class="mx" id="cl-receive">✕</button></div><div class="mb" id="fb-receive"></div></div></div>
<div class="ov" id="ov-dispense"><div class="modal"><div class="mh" style="background:linear-gradient(135deg,#C62828,#E53935)"><h3>📤 เบิกวัตถุดิบออก</h3><button class="mx" id="cl-dispense">✕</button></div><div class="mb" id="fb-dispense"></div></div></div>
<div class="si" id="si">💾 บันทึกแล้ว</div>
<div class="ov" id="ov-bom"><div class="modal" style="max-width:740px;width:96%"><div class="mh" style="background:linear-gradient(135deg,#E65100,#FF7043)"><h3 id="bom-modal-title">✏️ แก้ไข BOM</h3><button class="mx" id="cl-bom">✕</button></div><div class="mb" id="fb-bom" style="padding:16px 20px"></div></div></div>
<div id="pw-modal" style="position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.65)"><div style="background:#fff;border-radius:16px;padding:32px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popIn .2s ease-out"><div style="font-size:48px;margin-bottom:12px">🔒</div><h3 style="margin-bottom:8px;color:#333">ต้องใช้รหัสผ่าน</h3><p style="color:#888;font-size:13px;margin-bottom:20px">กรอกรหัสผ่านเพื่อแก้ไข BOM</p><input type="password" id="pw-inp" placeholder="รหัสผ่าน..." style="width:100%;padding:12px;border-radius:8px;border:2px solid #e0e0e0;font-size:16px;text-align:center;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:16px"><div style="display:flex;gap:10px"><button id="pw-cancel" style="flex:1;padding:12px;border-radius:8px;border:1px solid #e0e0e0;background:#f5f5f5;cursor:pointer;font-family:inherit;font-weight:600">ยกเลิก</button><button id="pw-ok" style="flex:1;padding:12px;border-radius:8px;border:none;background:linear-gradient(135deg,#E65100,#FF7043);color:#fff;cursor:pointer;font-family:inherit;font-weight:700">✅ ยืนยัน</button></div><p id="pw-err" style="color:#C62828;font-size:12px;margin-top:10px;display:none">❌ รหัสผ่านไม่ถูกต้อง</p></div></div>

<script>
// ========== Vercel API Integration ==========
let stk = {};
let txs = [];
let bq = {};
let bm = {};
let prList = [];
let IG = [];

const PC = {"Bio-Shampoo": "#2E7D32", "น้ำยาเช็ดหู/ตา": "#1565C0", "Nano Spray": "#6A1B9A", "Hair Coat": "#E65100", "Tear Stain Cleanser": "#00838F", "Wound Healing Gel 1kg": "#C62828", "Dry Foam Shampoo": "#F57F17", "Milk Shampoo": "#4A148C", "Bio-Shampoo ลดต้นทุน": "#1B5E20", "สเปรย์บำรุงขน": "#006064"};

async function initDB() {
  try {
    const response = await fetch('/api/data');
    const data = await response.json();
    console.log('Connected to Vercel API');
    
    if (data && data._id) {
      if (data.stk) stk = data.stk;
      if (data.txs) txs = data.txs;
      if (data.bq) bq = data.bq;
      if (data.bm) bm = data.bm;
      if (data.prList) prList = data.prList;
      IG = Object.keys(stk).sort();
    } else {
      alert('ไม่พบข้อมูลในระบบ Cloud กรุณาติดต่อผู้ดูแลระบบเพื่อทำการ Seed ข้อมูล');
    }
  } catch (err) {
    console.error('API Error:', err);
    alert('เชื่อมต่อ API ล้มเหลว - กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
  }
}

const SS = async (k, v) => {
  try {
    const e = document.getElementById('si');
    if (e) {
      e.innerHTML = '⏳ กำลังบันทึกไปยัง Cloud...';
      e.classList.add('show');
    }
    
    // Update local variables based on key
    const payload = {};
    if (k === 'stk') { stk = v; payload.stk = v; }
    if (k === 'txs' || k === 'tx') { txs = v; payload.txs = v; }
    if (k === 'bq') { bq = v; payload.bq = v; }
    if (k === 'bm') { bm = v; payload.bm = v; }
    if (k === 'prList') { prList = v; payload.prList = v; }

    // Sync to Vercel API
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    if (e) {
      e.innerHTML = '✅ บันทึกลง Cloud แล้ว';
      setTimeout(() => e.classList.remove('show'), 1500);
    }
  } catch (err) {
    console.error('Save error:', err);
    const e = document.getElementById('si');
    if (e) {
      e.innerHTML = '❌ บันทึกไม่สำเร็จ';
      setTimeout(() => e.classList.remove('show'), 2000);
    }
  }
};

// Init: ดึงข้อมูลจาก MongoDB ก่อนเริ่ม
(async () => {
  await initDB();
  prList.forEach(p => { if (bq[p] === undefined) bq[p] = 0 });
  initTabs();
  R();
})();
function checkAdmin(cb){
  const m=document.getElementById('pw-modal');
  const inp=document.getElementById('pw-inp');
  const err=document.getElementById('pw-err');
  m.style.display='flex';inp.value='';err.style.display='none';
  setTimeout(()=>inp.focus(),60);
  const ok=()=>{if(inp.value==='admin'){adminUnlocked=true;m.style.display='none';cb()}else{err.style.display='block';inp.value='';inp.focus()}};
  document.getElementById('pw-ok').onclick=ok;
  document.getElementById('pw-cancel').onclick=()=>{m.style.display='none'};
  inp.onkeydown=e=>{if(e.key==='Enter')ok()};
}
const F=n=>n===0?'—':n<.01?n.toFixed(3):n<1?n.toFixed(2):n.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
const E=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
function gb(ing){const s=stk[ing]||{};const o=Number(s.o)||0;const ti=txs.filter(t=>t.i===ing&&t.t==='in').reduce((a,t)=>a+(Number(t.a)||0),0);const to=txs.filter(t=>t.i===ing&&t.t==='out').reduce((a,t)=>a+(Number(t.a)||0),0);if(!s.o&&ti===0&&to===0)return null;return o+ti-to}
function tn(ing){let t=0;prList.forEach(p=>{t+=((bm[p]||{})[ing]||0)*(Number(bq[p])||0)});return t}

let ct='stock';
const TD=[{id:'stock',l:'📦 สต๊อกวัตถุดิบ',c:'g'},{id:'tx',l:'📋 บันทึกรับ-เบิก',c:'b'},{id:'bom',l:'🧪 BOM ต่อสูตร',c:'o'},{id:'calc',l:'🔢 คำนวณการผลิต',c:'p'}];
function initTabs(){const bar=document.getElementById('tabBar');bar.innerHTML=TD.map(t=>`<button class="tab${t.id===ct?' active':''}" data-c="${t.c}" data-id="${t.id}">${t.l}</button>`).join('');bar.addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;ct=b.dataset.id;bar.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===ct));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+ct));R()})}
function R(){({stock:rS,tx:rT,bom:rB,calc:rC})[ct]?.()}

let sf='',sfSup='';
function rS(){
  const el=document.getElementById('p-stock');
  const allSups=[...new Set(IG.map(i=>stk[i]?.s||'').filter(Boolean))].sort();
  const fl=IG.filter(i=>{
    const matchSearch=!sf||i.toLowerCase().includes(sf.toLowerCase());
    const matchSup=!sfSup||(stk[i]?.s||'')==sfSup;
    return matchSearch&&matchSup;
  });
  let h=`<div style="background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:12px;padding:10px 16px;margin-bottom:12px;font-size:12px;color:#2E7D32;border-left:4px solid #2E7D32;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    💾 บันทึกอัตโนมัติ ไม่หายเมื่อปิด | ${IG.length} วัตถุดิบ | ${allSups.length} Supplier
    </div>`;
  h+=`<div class="toolbar">
    <input class="search-box" placeholder="🔍 ค้นหา (${fl.length}/${IG.length})..." value="${E(sf)}" id="sf">
    <button class="btn btn-green" id="bri">➕ รับสารเข้า</button>
    <button class="btn btn-red" id="bdo">📤 เบิกสารออก</button>
  </div>`;
  // Supplier filter badges
  if(allSups.length){
    h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
      <span style="font-size:11px;color:#888;font-weight:600">กรอง Supplier:</span>
      <button class="sup-f ${!sfSup?'sup-f-on':''}" data-s="" style="padding:4px 12px;border-radius:20px;border:2px solid ${!sfSup?'#2E7D32':'#e0e0e0'};background:${!sfSup?'#E8F5E9':'#fff'};font-size:11px;cursor:pointer;font-family:inherit;font-weight:${!sfSup?700:400};color:${!sfSup?'#2E7D32':'#555'}">ทั้งหมด</button>`;
    allSups.forEach(s=>{const on=sfSup===s;h+=`<button class="sup-f ${on?'sup-f-on':''}" data-s="${E(s)}" style="padding:4px 12px;border-radius:20px;border:2px solid ${on?'#1565C0':'#e0e0e0'};background:${on?'#E3F2FD':'#fff'};font-size:11px;cursor:pointer;font-family:inherit;font-weight:${on?700:400};color:${on?'#1565C0':'#555'}">${E(s)}</button>`});
    h+=`</div>`;
  }
  h+=`<div class="card"><div class="tbl-scroll"><table><thead><tr style="background:#2E7D32">`;
  ['#','ชื่อวัตถุดิบ','สต๊อกเปิด (ก.)','รับเข้า','เบิกออก','คงเหลือ(ก.)','คงเหลือ(กก.)','สถานะ','Supplier','ราคา/กก.'].forEach(t=>{h+=`<th style="color:#fff;padding:10px 8px">${t}</th>`});
  h+=`</tr></thead><tbody>`;
  fl.forEach((ing,x)=>{
    const b=gb(ing);
    const ti=txs.filter(t=>t.i===ing&&t.t==='in').reduce((a,t)=>a+(Number(t.a)||0),0);
    const to=txs.filter(t=>t.i===ing&&t.t==='out').reduce((a,t)=>a+(Number(t.a)||0),0);
    const w=b!==null&&b<1000;
    const st=b===null?'<span style="color:#bbb;font-size:11px">—</span>':b<1000?'<span class="badge b-r" style="font-size:10px">⚠ ต่ำ</span>':b<5000?'<span class="badge b-y" style="font-size:10px">น้อย</span>':'<span class="badge b-g" style="font-size:10px">ปกติ</span>';
    const sup=stk[ing]?.s||'';
    h+=`<tr style="background:${w?'#FFF3F0':x%2?'#fff':'#fafafa'}">
      <td style="text-align:center;color:#999;font-size:11px">${x+1}</td>
      <td style="font-weight:500;font-size:12px">${E(ing)}</td>
      <td style="text-align:center">
        <div style="display:flex;align-items:center;justify-content:center;gap:4px">
          <button class="pm-btn minus-o" data-x="${x}" style="width:22px;height:22px;border-radius:5px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:14px;font-weight:700;line-height:1;color:#C62828;font-family:inherit">−</button>
          <input type="number" class="ci so" data-x="${x}" value="${stk[ing]?.o||''}" placeholder="0" style="width:80px;text-align:center">
          <button class="pm-btn plus-o" data-x="${x}" style="width:22px;height:22px;border-radius:5px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:14px;font-weight:700;line-height:1;color:#2E7D32;font-family:inherit">+</button>
        </div>
      </td>
      <td style="text-align:center;color:#2E7D32;font-weight:600;font-size:12px">${ti>0?F(ti):'—'}</td>
      <td style="text-align:center;color:#C62828;font-weight:600;font-size:12px">${to>0?F(to):'—'}</td>
      <td style="text-align:center;font-weight:700;color:${w?'#C62828':'#222'};font-size:12px">${b!==null?F(b):'—'}</td>
      <td style="text-align:center;font-size:12px">${b!==null?F(b/1000):'—'}</td>
      <td style="text-align:center">${st}</td>
      <td style="text-align:center"><input class="ci ci-w ss" data-x="${x}" value="${E(stk[ing]?.s||'')}" placeholder="—" style="font-size:11px;width:110px"></td>
      <td style="text-align:center"><input type="number" class="ci sp" data-x="${x}" value="${stk[ing]?.p||''}" placeholder="0" style="font-size:11px;width:70px"></td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;
  el.innerHTML=h;
  // Events

function buildForm(type){
  const isIn=type==='receive',box=document.getElementById('fb-'+type);
  let selIng='',selProd='';
  function draw(){
    let h=`<div class="fg"><div class="fl">ชื่อวัตถุดิบ * <span style="font-weight:400;color:#aaa;font-size:10px">(พิมพ์ค้นหาได้)</span></div><div class="sel-wrap" id="${type}-wrap-i"><button type="button" class="sel-btn" id="${type}-sb-i"><span style="color:${selIng?'#222':'#aaa'}">${selIng||'เลือกวัตถุดิบ...'}</span><span style="font-size:10px;color:#999">▼</span></button><div class="sel-drop" id="${type}-sd-i"><input class="sel-search" placeholder="🔍 พิมพ์ค้นหา..." id="${type}-ss-i"><div class="sel-list" id="${type}-sl-i"></div></div></div></div>`;
    if(isIn){
      h+=`<div class="fr"><div class="fg"><div class="fl">จำนวน (กรัม) *</div><input type="number" class="fi" id="${type}-amt" placeholder="0" min="0"></div><div class="fg"><div class="fl">ราคา/กก. (บาท)</div><input type="number" class="fi" id="${type}-prc" placeholder="0" min="0"></div></div>`;
      h+=`<div class="fg"><div class="fl">Supplier <span style="font-weight:400;color:#aaa;font-size:10px">(เลือกจากรายการ หรือพิมพ์ใหม่)</span></div><div style="position:relative"><input class="fi" id="${type}-sup" placeholder="พิมพ์ หรือเลือกจากรายการ..." autocomplete="off"><div class="sc-drop" id="${type}-sup-drop" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #ddd;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.13);z-index:300;max-height:160px;overflow-y:auto;margin-top:3px"></div></div></div>`;
    }else{
      h+=`<div class="fg"><div class="fl">จำนวน (กรัม) *</div><input type="number" class="fi" id="${type}-amt" placeholder="0" min="0"></div>`;
      h+=`<div class="fg"><div class="fl">เบิกให้สูตร/ผลิตภัณฑ์</div><div class="sel-wrap" id="${type}-wrap-p"><button type="button" class="sel-btn" id="${type}-sb-p"><span style="color:${selProd?'#222':'#aaa'}">${selProd||'เลือกสูตร...'}</span><span style="font-size:10px;color:#999">▼</span></button><div class="sel-drop" id="${type}-sd-p"><input class="sel-search" placeholder="🔍 พิมพ์ค้นหา..." id="${type}-ss-p"><div class="sel-list" id="${type}-sl-p"></div></div></div></div>`;
      h+=`<div class="fg"><div class="fl">Batch No.</div><input class="fi" id="${type}-bat" placeholder="เลขที่ Batch"></div>`;
    }
    h+=`<div class="fg"><div class="fl">หมายเหตุ</div><input class="fi" id="${type}-note" placeholder="บันทึกเพิ่มเติม..."></div>`;
    h+=`<button class="btn-sub" id="${type}-sub" style="background:${isIn?'linear-gradient(135deg,#2E7D32,#43A047)':'linear-gradient(135deg,#C62828,#E53935)'}">✅ บันทึก${isIn?'รับเข้า':'เบิกออก'}</button>`;
    box.innerHTML=h;
    wireSelect(type,'i',IG,selIng,v=>{selIng=v;draw()});
    if(!isIn)wireSelect(type,'p',prList,selProd,v=>{selProd=v;draw()});
    if(isIn){
      const si=document.getElementById(type+'-sup'),sd2=document.getElementById(type+'-sup-drop');
      const as=[...new Set(IG.map(i=>stk[i]?.s||'').filter(Boolean))].sort();
      function fillSup(q){
        const f=q?q.toLowerCase():'';
        const r=as.filter(s=>!f||s.toLowerCase().includes(f));
        if(!r.length){sd2.style.display='none';return}
        sd2.innerHTML=r.map(s=>`<div class="sc-opt" style="padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f5f5f5;font-family:inherit">${E(s)}</div>`).join('');
        sd2.style.display='block';
        sd2.querySelectorAll('.sc-opt').forEach(el=>{
          el.addEventListener('mousedown',e=>{e.preventDefault();si.value=el.textContent;sd2.style.display='none'});
          el.addEventListener('mouseover',()=>el.style.background='#FFF3E0');
          el.addEventListener('mouseout',()=>el.style.background='');
        });
      }
      if(si){
        si.addEventListener('focus',()=>fillSup(si.value));
        si.addEventListener('input',()=>fillSup(si.value));
        si.addEventListener('click',e=>e.stopPropagation());
        si.addEventListener('blur',()=>setTimeout(()=>sd2.style.display='none',150));
      }
    }
    document.getElementById(type+'-sub').addEventListener('click',()=>{
      const amtEl=document.getElementById(type+'-amt');
      const amt=amtEl?amtEl.value:'';
      if(!selIng||!amt||Number(amt)<=0){alert('กรุณาเลือกวัตถุดิบและกรอกจำนวน');return}
      const now=new Date();
      const d=`${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()+543} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      const newTx={id:Date.now(),d,t:isIn?'in':'out',i:selIng,a:Number(amt),
        pr:isIn?'':(selProd||''),
        b:isIn?'':(document.getElementById(type+'-bat')?.value||''),
        su:isIn?(document.getElementById(type+'-sup')?.value||''):'',
        pc:isIn?(document.getElementById(type+'-prc')?.value||''):'',
        n:document.getElementById(type+'-note')?.value||''};
      txs.unshift(newTx);
      SS('tx',txs);cM(type);R();
    });
  }
  draw();
}

function wireSelect(type,key,items,cur,onPick){
  const sb=document.getElementById(type+'-sb-'+key);
  const sd=document.getElementById(type+'-sd-'+key);
  const ss=document.getElementById(type+'-ss-'+key);
  const sl=document.getElementById(type+'-sl-'+key);
  if(!sb||!sd||!sl)return;
  function fill(q){
    const f=q?q.toLowerCase():'';
    const r=items.filter(it=>!f||it.toLowerCase().includes(f));
    sl.innerHTML=r.length?r.map((it,i)=>`<div class="sel-item${it===cur?' on':''}" data-idx="${i}">${E(it)}</div>`).join(''):'<div style="padding:16px;text-align:center;color:#999;font-size:13px">ไม่พบ</div>';
    sl.querySelectorAll('.sel-item').forEach(el=>{el.addEventListener('click',()=>{sd.classList.remove('show');sb.classList.remove('open');onPick(r[+el.dataset.idx])})});
  }
  fill('');
  sb.addEventListener('click',e=>{
    e.stopPropagation();
    const isOpen=sd.classList.contains('show');
    document.querySelectorAll('.sel-drop.show').forEach(d=>d.classList.remove('show'));
    document.querySelectorAll('.sel-btn.open').forEach(b=>b.classList.remove('open'));
    if(!isOpen){sd.classList.add('show');sb.classList.add('open');if(ss){ss.value='';ss.focus();fill('')}}
  });
  if(ss){ss.addEventListener('input',e=>fill(e.target.value));ss.addEventListener('click',e=>e.stopPropagation())}
}

document.addEventListener('click',()=>{
  document.querySelectorAll('.sel-drop.show').forEach(d=>d.classList.remove('show'));
  document.querySelectorAll('.sel-btn.open').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.sc-drop').forEach(d=>d.style.display='none');
});

// (Async init handles this)
</script>
</body>
</html>
